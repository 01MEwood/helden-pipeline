name: Build & Push to Docker Hub

# Triggert bei jedem Push auf main.
# Baut Frontend + Backend parallel und pusht zu Docker Hub (mariomeosv40/...)
# mit zwei Tags: 'latest' und der Commit-SHA (für rollbacks).

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: # erlaubt manuellen Trigger über GitHub UI

env:
  DOCKERHUB_NAMESPACE: mariomeosv40
  APP_NAME: helden-pipeline # <-- in jedem Modul anpassen (z.B. helden-pipeline)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [frontend, backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.APP_NAME }}-${{ matrix.component }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=${{ github.run_number }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,scope=${{ matrix.component }},mode=max

      - name: Image summary
        run: |
          echo "### ${{ matrix.component }} pushed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  notify-deploy-ready:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deployment instructions
        run: |
          echo "## Deploy bereit" >> $GITHUB_STEP_SUMMARY
          echo "Neue Images sind auf Docker Hub. Im Hostinger Docker Manager:" >> $GITHUB_STEP_SUMMARY
          echo "1. Gehe zu deinem Stack '${{ env.APP_NAME }}'" >> $GITHUB_STEP_SUMMARY
          echo "2. Klicke 'Restart' oder 'Recreate' (zieht latest neu)" >> $GITHUB_STEP_SUMMARY
          echo "3. Health-Check: https://${{ env.APP_NAME }}.meosapp.de/api/health" >> $GITHUB_STEP_SUMMARY
